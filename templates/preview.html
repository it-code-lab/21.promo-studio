<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ project.title }} Preview</title>
  <link rel="stylesheet" href="/static/preview.css?v={{ static_version }}" />
</head>
<body class="preview-page" data-project-id="{{ project.id }}">
  <main class="preview-shell">
    <section class="preview-toolbar">
      <a href="/" class="toolbar-link">Back</a>
      <div>
        <h1>{{ project.title }}</h1>
        <p>{{ project.productName }} · {{ project.format }} · {{ project.durationSeconds }}s</p>
      </div>
      <div class="toolbar-actions">
        <button id="playBtn" type="button" title="Space or K">Play</button>
        <button id="pauseBtn" type="button" title="Space or K">Pause</button>
        <button id="resumeBtn" type="button" title="Space or K">Resume</button>
        <button id="stopBtn" type="button" title="S">Stop</button>
        <button id="replayBtn" type="button" title="R">Replay</button>
        <button id="cleanBtn" type="button" title="C">Clean view</button>
        {% if project.outputUrl %}
          <a href="{{ project.outputUrl }}" target="_blank" class="toolbar-link">MP4</a>
        {% endif %}
      </div>
    </section>
    <section id="captionStyleTray" class="caption-style-tray" aria-label="Caption style preview picker"></section>
    <section class="caption-controls" aria-label="Preview caption controls">
      <label>
        Position
        <select id="previewCaptionPosition">
          <option value="">Scene default</option>
          <option value="top">Top</option>
          <option value="center">Center</option>
          <option value="bottom">Bottom</option>
          <option value="device">Near device</option>
        </select>
      </label>
      <label>
        Words
        <input id="previewWordsPerGroup" type="range" min="1" max="8" step="1" value="3" />
        <strong id="previewWordsValue">3</strong>
      </label>
      <label>
        Highlight
        <select id="previewHighlightMode">
          <option value="word">Current word</option>
          <option value="trail">Karaoke trail</option>
          <option value="pulse">Pulse word</option>
          <option value="none">None</option>
        </select>
      </label>
      <label>
        Size
        <select id="previewCaptionSize">
          <option value="">Scene default</option>
          <option value="compact">Compact</option>
          <option value="standard">Standard</option>
          <option value="large">Large</option>
          <option value="hero">Hero</option>
        </select>
      </label>
      <button id="resetCaptionPreviewBtn" type="button">Reset</button>
      <span id="captionTimingBadge" class="caption-timing-badge">Timing: estimated</span>
    </section>
    <section class="audio-controls" aria-label="Preview audio controls">
      <label>
        <span>Voiceover</span>
        <input id="voiceoverEnabled" type="checkbox" checked />
      </label>
      <label class="volume-field">
        Voice volume
        <input id="voiceoverVolume" type="range" min="0" max="1" step="0.01" value="0.9" />
        <strong id="voiceoverVolumeValue">90%</strong>
      </label>
      <label>
        <span>Music</span>
        <input id="musicEnabled" type="checkbox" checked />
      </label>
      <label class="volume-field">
        Music volume
        <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.18" />
        <strong id="musicVolumeValue">18%</strong>
      </label>
      <span id="audioStatus" class="audio-status">Audio ready</span>
    </section>

    <section id="previewStage" class="preview-stage vertical">
      <div class="scene-camera">
        <img id="backgroundImage" class="room-bg" alt="" />
        <video id="backgroundClipVideo" class="timeline-clip background-clip hidden" muted playsinline preload="auto"></video>
        <div class="warm-overlay"></div>
        <div class="tablet-stage">
          <div class="tablet-shell">
            <canvas id="screenCanvas" class="screen-canvas"></canvas>
            <video id="screenVideo" class="screen-source" muted playsinline preload="auto"></video>
            <video id="deviceClipVideo" class="screen-source" muted playsinline preload="auto"></video>
            <div class="tablet-glass"></div>
          </div>
        </div>
      </div>
      <video id="fullClipVideo" class="timeline-clip full-clip hidden" muted playsinline preload="auto"></video>
      <video id="overlayClipVideo" class="timeline-clip overlay-clip hidden" muted playsinline preload="auto"></video>
      <img id="logoImage" class="preview-logo hidden" alt="" />
      <div id="captionChip" class="caption-chip"></div>
      <div id="ctaPill" class="cta-pill hidden"></div>
    </section>
    <audio id="voiceoverAudio" preload="auto"></audio>
    <audio id="musicAudio" preload="auto" loop></audio>
  </main>

  <script id="projectData" type="application/json">{{ project | tojson }}</script>
  <script src="/static/preview.js?v={{ static_version }}"></script>
</body>
</html>
